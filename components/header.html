<script>
    // ============================================================
    // HEADER JAVASCRIPT
    // ============================================================

    // ===== SET ACTIVE NAV LINK =====
    (function setActiveNav() {
        var currentPage = window.location.pathname.split('/').pop() || 'index.html';
        var links = document.querySelectorAll('.nav-links a:not(.btn-primary)');
        links.forEach(function(link) {
            var href = link.getAttribute('href');
            if (href === currentPage) {
                link.classList.add('active');
            }
            if (currentPage === 'index.html' && href === 'index.html') {
                link.classList.add('active');
            }
            if ((currentPage === '' || currentPage === '/') && href === 'index.html') {
                link.classList.add('active');
            }
        });
    })();

    // ===== HAMBURGER MENU =====
    (function initHamburger() {
        var hamburger = document.getElementById('hamburger');
        var navLinks = document.getElementById('navLinks');

        if (hamburger && navLinks) {
            hamburger.addEventListener('click', function() {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('open');
            });

            var navLinksItems = document.querySelectorAll('.nav-links a');
            navLinksItems.forEach(function(link) {
                link.addEventListener('click', function() {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('open');
                });
            });
        }
    })();

    // ===== SEARCH FUNCTIONALITY =====
    function openSearch() {
        var overlay = document.getElementById('searchOverlay');
        if (overlay) {
            overlay.classList.add('active');
            var input = document.getElementById('searchInput');
            if (input) input.focus();
            document.body.style.overflow = 'hidden';
        }
    }

    function closeSearch() {
        var overlay = document.getElementById('searchOverlay');
        if (overlay) {
            overlay.classList.remove('active');
            var input = document.getElementById('searchInput');
            if (input) input.value = '';
            var results = document.getElementById('searchResults');
            if (results) results.innerHTML = '';
            document.body.style.overflow = '';
        }
    }

    function liveSearch(query) {
        var results = document.getElementById('searchResults');
        if (!results) return;
        if (query.length < 1) {
            results.innerHTML = '';
            return;
        }
        var data = window.searchData || [];
        var filtered = data.filter(function(item) {
            return item.title.toLowerCase().includes(query.toLowerCase());
        });
        if (filtered.length === 0) {
            results.innerHTML = '<div style="color:rgba(255,255,255,0.3);padding:14px 20px;">No results found</div>';
            return;
        }
        var html = '';
        filtered.forEach(function(item) {
            html += '<a href="' + item.page + '"><i class="fas ' + item.icon + '"></i> ' + item.title + '</a>';
        });
        results.innerHTML = html;
    }

    // Close search on ESC
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSearch();
    });

    // Close search on overlay click
    document.addEventListener('click', function(e) {
        var overlay = document.getElementById('searchOverlay');
        if (overlay && e.target === overlay) closeSearch();
    });

    // ===== NAVBAR SHADOW ON SCROLL =====
    (function initNavbarShadow() {
        var navbar = document.getElementById('navbar');
        if (navbar) {
            window.addEventListener('scroll', function() {
                navbar.style.boxShadow = window.pageYOffset > 50 ? '0 2px 20px rgba(0,0,0,0.06)' : 'none';
            });
        }
    })();
</script>
